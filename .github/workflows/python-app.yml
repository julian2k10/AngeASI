# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Ange ASI Integration

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # This ensures all subsequent steps run inside the conda environment
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.10"
          activate-environment: test-env
          # Use mamba for faster installation of heavy deps
          use-mamba: true 

      - name: Cache Conda env
        uses: actions/cache@v4
        with:
          path: /usr/share/miniconda/envs/test-env
          key: conda-${{ runner.os }}-${{ hashFiles('conda-requirements.txt') }}
        id: cache
      
      - name: Install Conda Dependencies
        run: |
          conda install --file conda-requirements.txt -c pytorch -c nvidia -c conda-forge

      - name: Run Tests
        run: pytest
